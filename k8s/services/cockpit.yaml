apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockpit
  namespace: cogmem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cockpit
  template:
    metadata:
      labels:
        app: cockpit
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: cockpit
        image: ghcr.io/cogmemai/cogmem-cockpit:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: openrouter-api-key
              optional: true
        - name: BACKEND_API_URL
          value: "http://backend-service:8000"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cockpit-service
  namespace: cogmem
spec:
  selector:
    app: cockpit
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
