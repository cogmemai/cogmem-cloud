apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cogmem
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: backend
        image: ghcr.io/cogmemai/cogmem-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: cogmem-config
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: secret-key
        - name: FIRST_SUPERUSER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: first-superuser-password
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: postgres-password
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: neo4j-password
        - name: QDRANT_API_KEY
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: qdrant-api-key
        - name: SURREAL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: surreal-password
        - name: SURREALDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: surreal-password
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: smtp-password
              optional: true
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: sentry-dsn
              optional: true
        livenessProbe:
          httpGet:
            path: /api/v1/utils/health-check/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/v1/utils/health-check/
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: cogmem
spec:
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
