apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: cogmem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:latest
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7687
          name: bolt
        env:
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cogmem-secrets
              key: neo4j-password
        - name: NEO4J_AUTH
          value: "neo4j/$(NEO4J_PASSWORD)"
        - name: NEO4J_PLUGINS
          value: '["apoc"]'
        - name: NEO4J_server_config_strict__validation_enabled
          value: "false"
        - name: NEO4J_server_bolt_advertised__address
          value: "148.113.224.191:7687"
        - name: NEO4J_server_http_advertised__address
          value: "148.113.224.191:443"
        - name: NEO4J_server_bolt_listen__address
          value: "0.0.0.0:7687"
        - name: NEO4J_server_http_listen__address
          value: "0.0.0.0:7474"
        - name: NEO4J_server_bolt_tls_level
          value: "DISABLED"
        volumeMounts:
        - name: neo4j-data
          mountPath: /var/lib/neo4j/data
        - name: neo4j-logs
          mountPath: /var/lib/neo4j/logs
        livenessProbe:
          exec:
            command:
            - "true"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - "true"
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 10
      volumes:
      - name: neo4j-data
        persistentVolumeClaim:
          claimName: neo4j-data-pvc
      - name: neo4j-logs
        persistentVolumeClaim:
          claimName: neo4j-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
  namespace: cogmem
spec:
  selector:
    app: neo4j
  ports:
  - name: http
    protocol: TCP
    port: 7474
    targetPort: 7474
  - name: bolt
    protocol: TCP
    port: 7687
    targetPort: 7687
  type: ClusterIP
